<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ARAB code</title>
<meta name="description" content="منصة ARAB code لنشر الأكواد">
<link rel="stylesheet" href="/styles.css">
<link rel="icon" href="/favicon.svg">
</head>
<body>
<nav class="nav">
  <a href="/" class="brand"><span class="dot"></span> ARAB code</a>
  <div class="nav-actions" id="nav-actions"></div>
</nav>
<header class="hero">
  <div class="sphere"></div>
  <h1>ARAB code</h1>
  <p class="tag">منصة نشر الأكواد</p>
</header>
<main class="container">
  <div id="codes" class="grid"></div>
  <p id="empty" style="text-align:center;color:var(--muted);display:none;margin-top:40px">لا توجد أكواد منشورة بعد.</p>
</main>
<script src="/app.js"></script>
<script>
(async () => {
  await renderNav();
  try {
    const { codes } = await api('/api/list');
    const box = document.getElementById('codes');
    if (!codes.length) { document.getElementById('empty').style.display='block'; return; }
    box.innerHTML = codes.map(codeCard).join('');
  } catch (e) { console.error(e); }
})();
</script>
</body>
</html>
