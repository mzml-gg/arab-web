<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>دخول · ARAB code</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<nav class="nav">
  <a href="/" class="brand"><span class="dot"></span> ARAB code</a>
  <div class="nav-actions" id="nav-actions"></div>
</nav>
<main>
  <form class="form" id="form">
    <h2 id="title">دخول</h2>
    <p class="sub" id="sub">أهلاً بعودتك</p>
    <div id="msg" class="msg"></div>

    <div id="fields-signup" style="display:none">
      <div class="field"><label>اسم المستخدم</label><input name="username" autocomplete="username" maxlength="20"/></div>
      <div class="field"><label>رقم واتساب <span style="color:var(--muted);font-size:.8em">(اختياري)</span></label><input name="phone" placeholder="+9665... أو اتركه فارغاً" autocomplete="tel"/></div>
    </div>
    <div class="field"><label>الإيميل</label><input type="email" name="email" autocomplete="email" required/></div>
    <div class="field"><label>كلمة السر</label><input type="password" name="password" autocomplete="current-password" required minlength="8"/></div>
    <div id="forgot-link" style="text-align:left;margin-top:-10px;margin-bottom:10px;">
      <a href="#" id="forgot-btn" style="font-size:0.85rem;color:var(--gold);">نسيت كلمة السر؟</a>
    </div>

    <button type="submit" class="btn primary submit" id="submit-btn">دخول</button>
    <div class="switch">
      <span id="switch-text">ليس لديك حساب؟</span>
      <a href="#" id="toggle">إنشاء حساب</a>
    </div>
  </form>
</main>
<script src="/app.js"></script>
<script>
renderNav();
let mode = 'login';
const params = new URLSearchParams(location.search);
if (params.get('mode') === 'signup') setMode('signup');
if (params.get('mode') === 'reset') setMode('reset');

document.getElementById('toggle').onclick = (e) => {
  e.preventDefault();
  setMode(mode === 'login' ? 'signup' : 'login');
};

document.getElementById('forgot-btn').onclick = (e) => {
  e.preventDefault();
  const email = document.querySelector('input[name="email"]').value;
  if (!email) {
    msg.className = 'msg err';
    msg.textContent = 'يرجى كتابة الإيميل أولاً';
    return;
  }
  if (confirm('هل تريد إرسال رابط استعادة كلمة السر إلى ' + email + '؟')) {
    api('/api/forgot-password', { method: 'POST', body: JSON.stringify({ email }) })
      .then(() => {
        msg.className = 'msg ok';
        msg.textContent = '✓ تم إرسال الرابط إلى بريدك.';
      })
      .catch(err => {
        msg.className = 'msg err';
        msg.textContent = err.message;
      });
  }
};

function setMode(m) {
  mode = m;
  const isSignup = m === 'signup';
  const isReset = m === 'reset';
  
  document.getElementById('title').textContent = isReset ? 'تعيين كلمة السر' : (isSignup ? 'إنشاء حساب' : 'دخول');
  document.getElementById('sub').textContent = isReset ? 'أدخل كلمة السر الجديدة' : (isSignup ? 'انضم إلى ARAB code' : 'أهلاً بعودتك');
  document.getElementById('fields-signup').style.display = isSignup ? '' : 'none';
  document.getElementById('submit-btn').textContent = isReset ? 'تغيير كلمة السر' : (isSignup ? 'إنشاء الحساب' : 'دخول');
  document.getElementById('switch-text').textContent = isSignup ? 'لديك حساب؟' : 'ليس لديك حساب؟';
  document.getElementById('toggle').textContent = isSignup ? 'دخول' : 'إنشاء حساب';
  
  if (isReset) {
    document.querySelector('input[name="email"]').readOnly = true;
    document.querySelector('input[name="email"]').value = params.get('email') || '';
    document.getElementById('forgot-link').style.display = 'none';
    document.querySelector('.switch').style.display = 'none';
  } else {
    document.querySelector('input[name="email"]').readOnly = false;
    document.querySelector('.switch').style.display = '';
    document.getElementById('forgot-link').style.display = isSignup ? 'none' : '';
  }

  document.querySelectorAll('#fields-signup input').forEach(i => {
    if (i.name !== 'phone') i.required = isSignup;
  });
}

document.getElementById('form').onsubmit = async (e) => {
  e.preventDefault();
  const msg = document.getElementById('msg');
  msg.className = 'msg'; msg.textContent = '';
  const fd = new FormData(e.target);
  const body = Object.fromEntries(fd.entries());
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; const old = btn.textContent; btn.textContent = '...';
  try {
    if (mode === 'signup') {
      const r = await api('/api/signup', { method: 'POST', body: JSON.stringify(body) });
      msg.className = 'msg ok';
      msg.textContent = r.needs_verification ? '✓ تم الإنشاء. تحقق من بريدك لتفعيل الحساب.' : '✓ تم إنشاء حساب الأدمن. سجّل الدخول.';
      setTimeout(() => setMode('login'), 2000);
    } else if (mode === 'reset') {
      const resetBody = { ...body, token: params.get('token') };
      await api('/api/reset-password', { method: 'POST', body: JSON.stringify(resetBody) });
      msg.className = 'msg ok';
      msg.textContent = '✓ تم تغيير كلمة السر بنجاح. يمكنك الدخول الآن.';
      setTimeout(() => {
        location.search = ''; // back to login
      }, 2000);
    } else {
      const r = await api('/api/login', { method: 'POST', body: JSON.stringify(body) });
      location.href = r.user.is_admin ? '/admin' : '/';
    }
  } catch (err) {
    msg.className = 'msg err';
    msg.textContent = err.message;
  } finally {
    btn.disabled = false; btn.textContent = old;
  }
};
</script>
</body>
</html>
