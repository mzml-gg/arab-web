<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة الإدارة — ARAB code</title>
<meta name="description" content="لوحة إدارة منصة ARAB code لمراجعة الأكواد المُرسَلة.">
<meta name="robots" content="noindex">
<link rel="stylesheet" href="/styles.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
<nav class="nav">
  <a href="/" class="brand">ARAB <span>code</span></a>
  <div class="nav-links"><a href="/admin.html">إدارة</a></div>
</nav>
<main>
  <div id="loginBox" class="form">
    <h2>🔐 دخول الإدارة</h2>
    <div id="loginMsg"></div>
    <div class="field"><label>البريد الإلكتروني</label><input id="email" class="input" type="email" placeholder="اكتب البريد المخصص لي لوحه الاداره"></div>
    <div class="field"><label>كلمة المرور</label><input id="password" class="input" type="password"></div>
    <button class="btn btn-primary" onclick="adminLogin()">دخول</button>
  </div>

  <div id="dashboard" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin:20px 0">
      <h2>📥 الطلبات المعلّقة</h2>
      <div>
        <button class="btn btn-ghost btn-sm" onclick="loadPending()">تحديث</button>
        <button class="btn btn-ghost btn-sm" onclick="adminLogout()">خروج</button>
      </div>
    </div>
    <div id="msg"></div>
    <div id="pendingList" class="admin-list"><div class="loading">جاري التحميل...</div></div>
  </div>
</main>
<footer><p>© ARAB code — Admin</p></footer>
<script src="/app.js"></script>
<script>
function adminLogin(){
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if(!email || !password){ document.getElementById('loginMsg').innerHTML='<div class="msg err">املأ الحقول.</div>'; return; }
  const token = btoa(email+':'+password);
  setAdminToken(token);
  checkAuth();
}
function adminLogout(){ clearAdminToken(); location.reload(); }

async function checkAuth(){
  const token = getAdminToken();
  if(!token){ show('loginBox'); return; }
  const r = await fetch('/api/pending',{headers:{'X-Admin-Token':token}});
  if(r.status===401){ clearAdminToken(); document.getElementById('loginMsg').innerHTML='<div class="msg err">بيانات غير صحيحة.</div>'; show('loginBox'); return; }
  show('dashboard');
  const items = await r.json();
  renderPending(items);
}
function show(id){
  document.getElementById('loginBox').style.display = id==='loginBox'?'block':'none';
  document.getElementById('dashboard').style.display = id==='dashboard'?'block':'none';
}
async function loadPending(){
  const r = await fetch('/api/pending',{headers:{'X-Admin-Token':getAdminToken()}});
  if(!r.ok){ document.getElementById('msg').innerHTML='<div class="msg err">تعذر التحميل.</div>'; return; }
  renderPending(await r.json());
}
function renderPending(items){
  const el = document.getElementById('pendingList');
  if(!items.length){ el.innerHTML='<div class="empty">لا توجد طلبات معلّقة ✅</div>'; return; }
  el.innerHTML = items.map(it=>`
    <div class="card admin-card" id="p-${it.id}">
      <div class="info">
        <h4>${escapeHtml(it.title)}</h4>
        <div class="meta"><span>@${escapeHtml(it.author||'مجهول')}</span><span>#${escapeHtml(it.id)}</span></div>
        <p class="desc" style="margin-top:8px">${escapeHtml(it.description||'')}</p>
        <p class="hint">اقتراح الاسم: <code>${escapeHtml(it.filename_hint||'—')}</code></p>
        <pre>${escapeHtml((it.code||'').slice(0,2000))}${(it.code||'').length>2000?'\n...':''}</pre>
        <div class="field" style="margin-top:12px"><label>اسم الملف النهائي (مع الامتداد)</label>
          <input class="input filename" placeholder="مثال: tiktok.js" value="${escapeHtml(it.filename_hint||'')}">
        </div>
        <div class="admin-actions">
          <button class="btn btn-primary btn-sm" onclick="approve('${it.id}')">✅ موافقة ونشر</button>
          <button class="btn btn-danger btn-sm" onclick="reject('${it.id}')">🗑️ رفض</button>
        </div>
      </div>
    </div>
  `).join('');
}
async function approve(id){
  const box = document.getElementById('p-'+id);
  const filename = box.querySelector('.filename').value.trim();
  if(!filename){ alert('أدخل اسم الملف'); return; }
  const r = await fetch('/api/approve',{method:'POST',headers:{'Content-Type':'application/json','X-Admin-Token':getAdminToken()},body:JSON.stringify({id,filename})});
  const j = await r.json();
  if(!r.ok){ alert(j.error||'فشل'); return; }
  document.getElementById('msg').innerHTML=`<div class="msg ok">✅ نُشر على: <a href="/codes/${encodeURIComponent(filename)}" target="_blank" style="color:#4ade80">/codes/${escapeHtml(filename)}</a></div>`;
  loadPending();
}
async function reject(id){
  if(!confirm('رفض هذا الطلب؟')) return;
  const r = await fetch('/api/reject',{method:'POST',headers:{'Content-Type':'application/json','X-Admin-Token':getAdminToken()},body:JSON.stringify({id})});
  if(!r.ok){ alert('فشل'); return; }
  loadPending();
}
checkAuth();
</script>
</body>
</html>
