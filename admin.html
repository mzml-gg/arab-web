<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>الإدارة · ARAB code</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<nav class="nav">
  <a href="/" class="brand"><span class="dot"></span> ARAB code</a>
  <div class="nav-actions" id="nav-actions"></div>
</nav>
<main class="container">
  <h2 style="color:var(--gold-2)">طلبات في الانتظار</h2>
  <div id="msg" class="msg"></div>
  <div id="list" class="pending-list"></div>
  <p id="empty" style="color:var(--muted);text-align:center;display:none">لا توجد طلبات.</p>
</main>
<script src="/app.js"></script>
<script>
(async () => {
  await renderNav();
  const me = await loadMe();
  if (!me || !me.is_admin) { location.href='/auth'; return; }
  await load();
})();

async function load() {
  const list = document.getElementById('list');
  list.innerHTML = '<p style="color:var(--muted)">تحميل...</p>';
  try {
    const { items } = await api('/api/pending');
    if (!items.length) { list.innerHTML=''; document.getElementById('empty').style.display='block'; return; }
    document.getElementById('empty').style.display='none';
    list.innerHTML = items.map(renderItem).join('');
  } catch (e) { list.innerHTML = `<p style="color:var(--danger)">${esc(e.message)}</p>`; }
}

function renderItem(it) {
  const suggested = (it.title || 'code').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,40) + '.' + (it.language||'txt');
  return `<div class="pending-item" data-id="${esc(it.id)}">
    <h4>${esc(it.title)}</h4>
    <div style="display:flex;align-items:center;gap:10px;font-size:12px;color:var(--gold-dim);margin-bottom:6px">
      ${avatarHTML(it.author)} <span>·</span> <span class="lang-tag">${esc(it.language)}</span>
      <span>·</span> <span>${new Date(it.submitted_at).toLocaleString('ar')}</span>
    </div>
    <p style="color:var(--muted);margin:6px 0">${esc(it.description||'')}</p>
    <div class="code-preview">${esc(it.code)}</div>
    <div class="pending-actions">
      <input type="text" placeholder="اسم الملف مثل: ${esc(suggested)}" value="${esc(suggested)}" />
      <button class="btn primary" onclick="doApprove('${esc(it.id)}', this)">موافقة</button>
      <button class="btn danger" onclick="doReject('${esc(it.id)}', this)">رفض</button>
    </div>
  </div>`;
}

async function doApprove(id, btn) {
  const item = btn.closest('.pending-item');
  const filename = item.querySelector('input').value.trim();
  if (!filename) return alert('حدد اسم الملف');
  btn.disabled = true;
  try {
    const r = await api('/api/approve', { method:'POST', body: JSON.stringify({ id, filename }) });
    item.remove();
    showMsg('تمت الموافقة: ' + r.url, true);
  } catch (e) { showMsg(e.message, false); btn.disabled=false; }
}
async function doReject(id, btn) {
  if (!confirm('رفض هذا الطلب؟')) return;
  btn.disabled=true;
  try { await api('/api/reject', { method:'POST', body: JSON.stringify({ id }) }); btn.closest('.pending-item').remove(); showMsg('تم الرفض', true); }
  catch (e) { showMsg(e.message, false); btn.disabled=false; }
}
function showMsg(t, ok) { const m=document.getElementById('msg'); m.className='msg '+(ok?'ok':'err'); m.textContent=t; setTimeout(()=>{m.className='msg';m.textContent='';},3500); }
</script>
</body>
</html>
