<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بحث — ARAB code</title>
<meta name="description" content="ابحث بين الأكواد المنشورة على ARAB code.">
<link rel="stylesheet" href="/styles.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
<nav class="nav">
  <a href="/" class="brand">ARAB <span>code</span></a>
  <div class="nav-links">
    <a href="/search.html">بحث</a>
    <a href="/submit.html">أضف كود</a>
    <a href="/account.html">حسابي</a>
  </div>
</nav>
<main>
  <div class="form" style="margin-top:20px">
    <h2>🔍 بحث في الأكواد</h2>
    <input id="q" class="input" placeholder="ابحث بالعنوان، الوصف، الاسم، أو داخل الكود..." autofocus>
    <div class="hint">البحث يشمل محتوى الكود أيضاً.</div>
  </div>
  <div id="results" class="grid"><div class="loading">اكتب للبحث...</div></div>
</main>
<footer><p>© ARAB code</p></footer>
<script src="/app.js"></script>
<script>
let all = [];
let deep = {};
const q = document.getElementById('q');
const results = document.getElementById('results');

async function init(){
  const r = await fetch('/api/list');
  all = await r.json();
  render(all);
}
async function search(term){
  term = term.trim().toLowerCase();
  if(!term){ render(all); return; }
  // شامل: عنوان/وصف/اسم أولاً
  let matched = all.filter(it =>
    (it.title||'').toLowerCase().includes(term) ||
    (it.description||'').toLowerCase().includes(term) ||
    (it.filename||'').toLowerCase().includes(term) ||
    (it.language||'').toLowerCase().includes(term)
  );
  // البحث داخل الكود عبر endpoint
  try{
    const r = await fetch('/api/search?q='+encodeURIComponent(term));
    if(r.ok){
      const inCode = await r.json();
      const ids = new Set(matched.map(m=>m.filename));
      inCode.forEach(x=>{ if(!ids.has(x.filename)){ matched.push(x); ids.add(x.filename); } });
    }
  }catch(e){}
  render(matched);
}
function render(list){
  if(!list.length){ results.innerHTML = '<div class="empty">لا نتائج.</div>'; return; }
  results.innerHTML = list.map(cardHtml).join('');
}
let t;
q.addEventListener('input', ()=>{ clearTimeout(t); t = setTimeout(()=>search(q.value), 250); });
init();
</script>
</body>
</html>
