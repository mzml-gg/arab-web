<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>إضافة كود · ARAB code</title>
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<nav class="nav">
  <a href="/" class="brand"><span class="dot"></span> ARAB code</a>
  <div class="nav-actions" id="nav-actions"></div>
</nav>
<main>
  <form class="form" id="form" style="max-width:640px">
    <h2>إضافة كود</h2>
    <p class="sub">راح يُراجَع من الإدارة قبل النشر</p>
    <div id="msg" class="msg"></div>
    <div class="field"><label>العنوان</label><input name="title" required maxlength="120"/></div>
    <div class="field"><label>وصف قصير</label><input name="description" maxlength="300"/></div>
    <div class="field"><label>اللغة</label>
      <select name="language">
        <option value="js">JavaScript</option>
        <option value="html">HTML</option>
        <option value="css">CSS</option>
        <option value="py">Python</option>
        <option value="php">PHP</option>
        <option value="java">Java</option>
        <option value="cpp">C++</option>
        <option value="cs">C#</option>
        <option value="ts">TypeScript</option>
        <option value="go">Go</option>
        <option value="rs">Rust</option>
        <option value="txt">أخرى</option>
      </select>
    </div>
    <div class="field"><label>الكود</label><textarea name="code" rows="14" required></textarea></div>
    <button type="submit" class="btn primary submit">إرسال للمراجعة</button>
  </form>
</main>
<script src="/app.js"></script>
<script>
(async () => {
  await renderNav();
  const me = await loadMe();
  if (!me) { location.href = '/auth?mode=login'; return; }
})();
document.getElementById('form').onsubmit = async (e) => {
  e.preventDefault();
  const msg = document.getElementById('msg'); msg.className='msg'; msg.textContent='';
  const body = Object.fromEntries(new FormData(e.target).entries());
  try {
    await api('/api/submit', { method:'POST', body: JSON.stringify(body) });
    msg.className='msg ok'; msg.textContent='✓ تم الإرسال. سيراجعه الأدمن.';
    e.target.reset();
  } catch (err) { msg.className='msg err'; msg.textContent=err.message; }
};
</script>
</body>
</html>
