<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أضف كود — ARAB code</title>
<meta name="description" content="أرسل كودك للمراجعة والنشر على منصة ARAB code.">
<link rel="stylesheet" href="/styles.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
<nav class="nav">
  <a href="/" class="brand">ARAB <span>code</span></a>
  <div class="nav-links">
    <a href="/search.html">بحث</a>
    <a href="/submit.html">أضف كود</a>
    <a href="/account.html">حسابي</a>
  </div>
</nav>

<main>
  <div class="form">
    <h2>📤 إرسال كود للمراجعة</h2>
    <div id="userBar"></div>
    <div id="msg"></div>
    <form id="submitForm">
      <div class="field">
        <label>عنوان الكود</label>
        <input class="input" name="title" required maxlength="120" placeholder="مثال: أداة تنزيل من تيك توك">
      </div>
      <div class="field">
        <label>وصف مختصر</label>
        <input class="input" name="description" maxlength="240" placeholder="ماذا يفعل هذا الكود؟">
      </div>
      <div class="field">
        <label>اسم الملف المقترح (اختياري)</label>
        <input class="input" name="filename_hint" maxlength="60" placeholder="مثال: tiktok.js — الإدارة قد تغيّره">
        <div class="hint">الإدارة تختار الاسم النهائي عند الموافقة. الرابط سيكون: <code>/codes/الاسم</code></div>
      </div>
      <div class="field">
        <label>الكود</label>
        <textarea class="textarea" name="code" required placeholder="ألصق الكود هنا..."></textarea>
      </div>
      <button class="btn btn-primary" type="submit">إرسال للمراجعة</button>
    </form>
  </div>
</main>

<footer><p>© ARAB code</p></footer>
<script src="/app.js"></script>
<script>
renderUserBar('userBar');
document.getElementById('submitForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const msg = document.getElementById('msg');
  msg.innerHTML = '';
  const u = getUser();
  const fd = new FormData(e.target);
  const body = {
    title: fd.get('title'),
    description: fd.get('description'),
    filename_hint: fd.get('filename_hint'),
    code: fd.get('code'),
    author: u ? u.username : 'مجهول',
    author_email: u ? u.email : ''
  };
  const btn = e.target.querySelector('button');
  btn.disabled = true; btn.textContent = 'جاري الإرسال...';
  try{
    const r = await fetch('/api/submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const j = await r.json();
    if(!r.ok) throw new Error(j.error||'فشل الإرسال');
    msg.innerHTML = `<div class="msg ok">✅ تم إرسال الكود بنجاح! رقم الطلب: <code>${j.id}</code> — بانتظار موافقة الإدارة.</div>`;
    e.target.reset();
    if(u){ const list = JSON.parse(localStorage.getItem('my_submissions')||'[]'); list.push({id:j.id,title:body.title,at:Date.now()}); localStorage.setItem('my_submissions',JSON.stringify(list)); }
  }catch(err){
    msg.innerHTML = `<div class="msg err">❌ ${err.message}</div>`;
  }finally{
    btn.disabled = false; btn.textContent = 'إرسال للمراجعة';
  }
});
</script>
</body>
</html>
