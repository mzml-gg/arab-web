<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ملف مستخدم · ARAB code</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<nav class="nav">
  <a href="/" class="brand"><span class="dot"></span> ARAB code</a>
  <div class="nav-actions" id="nav-actions"></div>
</nav>
<main class="container">
  <div id="profile"></div>
  <h3 style="color:var(--gold-2);margin-top:24px">الأكواد المنشورة</h3>
  <div id="codes" class="grid"></div>
  <p id="empty" style="color:var(--muted);text-align:center;display:none">لم ينشر هذا المستخدم أي كود بعد.</p>
</main>
<script src="/app.js"></script>
<script>
(async () => {
  await renderNav();
  const parts = location.pathname.split('/').filter(Boolean);
  const username = decodeURIComponent(parts[1] || '');
  if (!username) { location.href='/'; return; }
  try {
    const { user, codes, count } = await api('/api/user?username=' + encodeURIComponent(username));
    document.getElementById('profile').innerHTML = `
      <div class="profile">
        <span class="avatar lg">${esc(user.username.charAt(0).toUpperCase())}</span>
        <div class="info">
          <h2>@${esc(user.username)}</h2>
          <p>عضو منذ ${new Date(user.created_at).toLocaleDateString('ar')} · ${count} كود منشور</p>
        </div>
      </div>`;
    if (!codes.length) document.getElementById('empty').style.display='block';
    else document.getElementById('codes').innerHTML = codes.map(codeCard).join('');
  } catch (e) {
    document.getElementById('profile').innerHTML = `<p style="color:var(--danger);text-align:center">${esc(e.message)}</p>`;
  }
})();
</script>
</body>
</html>
